security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    role_hierarchy:
        ROLE_PLAYER:  ROLE_USER
        ROLE_CREATOR: ROLE_USER
        ROLE_ADMIN:   [ROLE_PLAYER, ROLE_CREATOR]
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            entry_point: jwt
            json_login:
                check_path: api_login_check
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            login_throttling:
                max_attempts: 5
                interval: '1 minute'
            refresh_jwt:
                check_path: /api/auth/refresh
            jwt: ~
        admin:
            pattern: ^/admin
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: admin_login
                check_path: admin_login
                default_target_path: /admin
                enable_csrf: true
            logout:
                path: admin_logout
                target: admin_login
        main:
            lazy: true
    access_control:
        # Admin area — session auth
        - { path: ^/admin/login,    roles: PUBLIC_ACCESS }
        - { path: ^/admin/api/doc,  roles: ROLE_ADMIN }
        - { path: ^/admin,          roles: ROLE_ADMIN }

        # API doc — public Swagger UI
        - { path: ^/api/doc,                    roles: PUBLIC_ACCESS }

        # API — public endpoints (no JWT required)
        - { path: ^/api/health$,                roles: PUBLIC_ACCESS }
        - { path: ^/api/test$,                  roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/login$,            roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/register$,         roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/refresh$,          roles: PUBLIC_ACCESS }
        - { path: ^/api/oracle/tables$,         roles: PUBLIC_ACCESS }
        - { path: ^/api/oracle/random-setting$, roles: PUBLIC_ACCESS }

        # API — authenticated endpoints
        - { path: ^/api/auth/me$,   roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/player,     roles: ROLE_PLAYER }
        - { path: ^/api/game,       roles: ROLE_PLAYER }
        - { path: ^/api/oracle,     roles: ROLE_CREATOR }

        # Catch-all
        - { path: ^/api,            roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
