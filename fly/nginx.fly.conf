# Fly.io nginx config for the Symfony backend.
# Identical to docker/nginx/backend.prod.conf with two differences:
#   1. fastcgi_pass uses 127.0.0.1:9000 (PHP-FPM is in the same container)
#   2. Logs go to stdout/stderr (Fly captures container output)

# ── Rate limiting ──────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# ── FastCGI micro-cache ────────────────────────────────────────────────────────
fastcgi_cache_path /tmp/nginx_cache
    levels=1:2
    keys_zone=symfony_cache:10m
    max_size=100m
    inactive=60s
    use_temp_path=off;

fastcgi_cache_key "$scheme$request_method$host$request_uri";

server {
    listen 80;
    server_name _;

    root /var/www/backend/public;
    index index.php;

    client_max_body_size 1m;

    # ── Gzip compression ───────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1000;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Content-Type-Options      "nosniff"                         always;
    add_header X-Frame-Options             "DENY"                            always;
    add_header X-XSS-Protection            "1; mode=block"                   always;
    add_header Content-Security-Policy     "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'" always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security   "max-age=31536000"                always;
    add_header Permissions-Policy
        "accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), display-capture=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
        always;

    server_tokens off;

    # ── Routing ────────────────────────────────────────────────────────────────
    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ^~ /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        try_files $uri /index.php$is_args$args;
    }

    # ── PHP-FPM with micro-cache ───────────────────────────────────────────────
    # PHP-FPM runs in the same container — connect via localhost.
    location ~ ^/index\.php(/|$) {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT   $realpath_root;
        include        fastcgi_params;

        fastcgi_cache_bypass  $http_authorization $cookie_session;
        fastcgi_no_cache      $http_authorization $cookie_session;

        set $no_cache 0;
        if ($request_method !~ ^(GET|HEAD)$) {
            set $no_cache 1;
        }
        fastcgi_cache_bypass $no_cache;
        fastcgi_no_cache     $no_cache;

        fastcgi_cache        symfony_cache;
        fastcgi_cache_valid  200 1s;
        fastcgi_cache_valid  404 10s;

        add_header X-Cache-Status $upstream_cache_status always;

        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~ /\. {
        deny all;
        access_log  off;
        log_not_found off;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Logging to stdout/stderr (Fly.io captures container output) ────────────
    access_log /dev/stdout;
    error_log  /dev/stderr warn;
}
